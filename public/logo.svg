<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&amp;family=Montserrat:wght@400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="#FDF6EC" stroke="#C8946A" stroke-width="3"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="#C8946A" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Cookie icon -->
  <circle cx="200" cy="155" r="52" fill="#C8946A"/>
  <!-- Cookie texture dots -->
  <circle cx="185" cy="142" r="6" fill="#7B4A1E"/>
  <circle cx="210" cy="150" r="5" fill="#7B4A1E"/>
  <circle cx="193" cy="163" r="7" fill="#7B4A1E"/>
  <circle cx="216" cy="168" r="5" fill="#7B4A1E"/>
  <circle cx="200" cy="140" r="4" fill="#7B4A1E"/>
  <!-- Bite mark -->
  <circle cx="245" cy="118" r="22" fill="#FDF6EC"/>
  <circle cx="248" cy="112" r="18" fill="#FDF6EC"/>

  <!-- Wheat sprigs left -->
  <g stroke="#C8946A" stroke-width="2" fill="none">
    <line x1="110" y1="210" x2="130" y2="180"/>
    <ellipse cx="119" cy="196" rx="7" ry="4" transform="rotate(-35 119 196)" fill="#C8946A"/>
    <ellipse cx="127" cy="184" rx="6" ry="3.5" transform="rotate(-35 127 184)" fill="#C8946A"/>
    <line x1="100" y1="215" x2="112" y2="185"/>
    <ellipse cx="106" cy="202" rx="6" ry="3.5" transform="rotate(-20 106 202)" fill="#C8946A"/>
  </g>

  <!-- Wheat sprigs right -->
  <g stroke="#C8946A" stroke-width="2" fill="none">
    <line x1="290" y1="210" x2="270" y2="180"/>
    <ellipse cx="281" cy="196" rx="7" ry="4" transform="rotate(35 281 196)" fill="#C8946A"/>
    <ellipse cx="273" cy="184" rx="6" ry="3.5" transform="rotate(35 273 184)" fill="#C8946A"/>
    <line x1="300" y1="215" x2="288" y2="185"/>
    <ellipse cx="294" cy="202" rx="6" ry="3.5" transform="rotate(20 294 202)" fill="#C8946A"/>
  </g>

  <!-- PATRICIA text -->
  <text x="200" y="232" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="30" 
    font-weight="bold"
    letter-spacing="7"
    fill="#3D1F0A" 
    text-anchor="middle">PATRICIA</text>

  <!-- Divider line with diamond -->
  <line x1="100" y1="245" x2="178" y2="245" stroke="#C8946A" stroke-width="1.5"/>
  <polygon points="200,239 207,245 200,251 193,245" fill="#C8946A"/>
  <line x1="222" y1="245" x2="300" y2="245" stroke="#C8946A" stroke-width="1.5"/>

  <!-- BAKES text -->
  <text x="200" y="272" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="22"
    font-style="italic"
    letter-spacing="10"
    fill="#C8946A" 
    text-anchor="middle">bakes</text>

  <!-- Small dots decoration -->
  <circle cx="155" cy="290" r="3" fill="#C8946A"/>
  <circle cx="167" cy="290" r="3" fill="#C8946A"/>
  <circle cx="179" cy="290" r="3" fill="#C8946A"/>
  <circle cx="221" cy="290" r="3" fill="#C8946A"/>
  <circle cx="233" cy="290" r="3" fill="#C8946A"/>
  <circle cx="245" cy="290" r="3" fill="#C8946A"/>

  <!-- Tagline -->
  <text x="200" y="313" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="10"
    letter-spacing="3"
    fill="#3D1F0A" 
    text-anchor="middle">HECHO CON AMOR · CALI</text>

  <!-- WhatsApp number -->
  <text x="200" y="335"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12"
    letter-spacing="2"
    fill="#C8946A"
    text-anchor="middle">📱 350 695 4748</text>
</svg>
